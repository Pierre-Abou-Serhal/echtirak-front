<div class="card">
    <p-select
        [options]="generators"
        [(ngModel)]="selectedGeneratorId"
        optionLabel="label"
        optionValue="value"
        placeholder="Select generator"
        class="w-full md:w-56 me-2"
        [loading]="isGeneratorsLoading"
    />

    <p-tabs [(value)]="activeTab">
        <p-tablist>
            <p-tab value="0"><span class="text-2xl font-bold">Meterd</span></p-tab>
            <p-tab value="1"><span class="text-2xl font-bold">Fixed</span></p-tab>
        </p-tablist>
        <p-tabpanels>
            <p-tabpanel value="0">
                <app-metered-bill-generation [generatorId]="selectedGeneratorId"></app-metered-bill-generation>
            </p-tabpanel>
            <p-tabpanel value="1">
                <app-fixed-bill-generation></app-fixed-bill-generation>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</div>

<app-bills-preview-component [billsPreview]="billsPreview"></app-bills-preview-component>
