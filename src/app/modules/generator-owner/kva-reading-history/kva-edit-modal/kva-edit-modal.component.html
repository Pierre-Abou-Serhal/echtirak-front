<p-dialog
    [(visible)]="visible"
    [style]="{ width: '640px', maxWidth: '95vw' }"
    [breakpoints]="{ '960px': '75vw', '640px': '95vw' }"
    header="KWH Reading Details"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    (onHide)="close()"
>
    <ng-template #content>
        @if (editable) {
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- Subscriber (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Subscriber</label>
                    <input
                        pInputText
                        class="w-full"
                        [ngModel]="editable.subscriberFirstName + ' ' + editable.subscriberLastName"
                        disabled
                    />
                </div>

                <!-- Phone (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Phone</label>
                    <input pInputText class="w-full" [ngModel]="editable.subscriberPhoneNumber" disabled />
                </div>

                <!-- Generator (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Generator</label>
                    <input pInputText class="w-full" [ngModel]="editable.generatorCode" disabled />
                </div>

                <!-- Meter No (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Meter No.</label>
                    <input pInputText class="w-full" [ngModel]="editable.electricMeterNumber" disabled />
                </div>

                <!-- Previous KWH (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Previous KWH</label>
                    <p-inputnumber
                        [ngModel]="editable.kvaPrevious"
                        mode="decimal"
                        [minFractionDigits]="0"
                        [maxFractionDigits]="4"
                        class="w-full"
                        [disabled]="true"
                    ></p-inputnumber>
                </div>

                <!-- Current KWH (disabled) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Current KWH</label>
                    <p-inputnumber
                        [ngModel]="editable.kvaCurrent"
                        mode="decimal"
                        [minFractionDigits]="0"
                        [maxFractionDigits]="4"
                        class="w-full"
                        [disabled]="true"
                    ></p-inputnumber>
                </div>

                <!-- KWH Reading (editable) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">KWH Reading</label>
                    <p-inputnumber
                        [(ngModel)]="editable.kvaReading"
                        mode="decimal"
                        [minFractionDigits]="0"
                        [maxFractionDigits]="4"
                        class="w-full"
                    ></p-inputnumber>

                    @if (submitted && isKvaReadingInvalid()) {
                        <small class="text-red-500">
                            KWH Reading must be greater than Current KWH ({{ editable.kvaCurrent }}).
                        </small>
                    }
                </div>

                <!-- Status (editable) -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Status</label>
                    <p-select
                        class="w-full"
                        [options]="kvaReadingStatuses"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Select status"
                        [(ngModel)]="editable.status"
                        [overlayOptions]="getOverlayOptions()"
                    ></p-select>

                    @if (submitted && !editable.status) {
                        <small class="text-red-500">Status is required.</small>
                    }
                </div>

            </div>
        }
    </ng-template>

    <ng-template #footer>
        <div class="flex justify-end gap-2">
            <p-button label="Cancel" icon="pi pi-times" text (click)="close()"></p-button>
            <p-button label="Save" icon="pi pi-check" (click)="submit()" severity="primary"></p-button>
        </div>
    </ng-template>
</p-dialog>
