<div class="flex flex-col">
    <h1 class="text-3xl font-bold mb-4">
        SMS Templates
        <p class="text-sm text-surface-500 mt-1">
            See how your templates will be sent to customers
        </p>
    </h1>

    <div class="card">

        <div class="grid grid-cols-12 gap-4">
            <!-- LOADING STATE: skeleton cards -->
            @if (loading) {
                @for (_ of [1, 2, 3, 4, 5, 6]; track $index) {
                    <div class="col-span-12 sm:col-span-6 lg:col-span-4">
                        <article class="h-full bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-700
                     rounded-2xl shadow-sm flex flex-col">
                            <header class="px-4 pt-4 pb-2 flex items-start justify-between gap-3">
                                <div class="w-full">
                                    <p-skeleton width="70%" height="1.25rem" class="mb-2"></p-skeleton>
                                    <p-skeleton width="40%" height="0.75rem"></p-skeleton>
                                </div>
                            </header>

                            <div class="px-4 pb-4 pt-2 flex-1">
                                <p-skeleton width="100%" height="0.75rem" class="mb-2"></p-skeleton>
                                <p-skeleton width="90%" height="0.75rem" class="mb-2"></p-skeleton>
                                <p-skeleton width="80%" height="0.75rem"></p-skeleton>
                            </div>

                            <footer class="px-4 pb-4 pt-2 border-t border-surface-100 dark:border-surface-800
                       flex items-center justify-between gap-2">
                                <p-skeleton width="30%" height="0.75rem"></p-skeleton>
                                <p-skeleton width="20%" height="0.75rem"></p-skeleton>
                            </footer>
                        </article>
                    </div>
                }
            }
            @else {
                <!-- LOADED STATE: real data cards -->
                @for (item of smsTemplates; track item.id) {
                    <div class="col-span-12 sm:col-span-6 lg:col-span-4">
                        <article class="h-full bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-700
                        rounded-2xl shadow-sm hover:shadow-md hover:-translate-y-[1px]
                        transition-all duration-150 flex flex-col">
                            <!-- Header -->
                            <header class="px-4 pt-4 pb-2 flex items-start justify-between gap-3">
                                <div class="flex-1">
                                    <h3 class="text-base font-semibold text-surface-900 dark:text-surface-0">
                                        {{ item.name }}
                                    </h3>
                                </div>
                            </header>

                            <!-- Body -->
                            <div class="px-4 pb-4 pt-2 flex-1">
                                <p class="text-md leading-relaxed text-surface-700 dark:text-surface-200 whitespace-pre-line">
                                    {{ item.body }}
                                </p>
                            </div>

                            <!-- Footer -->
                            <footer class="px-4 pb-4 pt-2 border-t border-surface-100 dark:border-surface-800 flex items-center justify-between gap-2">
                                <span class="text-xs text-surface-500 flex items-center gap-1">
                                    <i class="pi pi-message text-xs"></i>
                                    <span>{{ item.body.length }} chars</span>
                                </span>
                            </footer>
                        </article>
                    </div>
                }
            }
        </div>
    </div>
</div>
