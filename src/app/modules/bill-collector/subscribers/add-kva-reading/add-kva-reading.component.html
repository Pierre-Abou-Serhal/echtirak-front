<div class="card">
    <div class="p-3 max-w-xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-2 mb-4">
            <p-button
                icon="pi pi-arrow-left"
                severity="primary"
                text
                (click)="goBack()"
            ></p-button>

            <div class="flex flex-col">
                <div class="text-lg font-semibold">Add KVA Reading</div>
                <div class="text-sm text-color-secondary">Subscriber #{{ subscriberId }}</div>
            </div>
        </div>

        <!-- Card -->
        <div class="border border-surface-200 rounded-xl p-3 flex flex-col gap-4">
            <!-- KVA Reading -->
            <div>
                <label class="block text-sm font-semibold mb-2">KVA Reading *</label>

                <p-inputnumber
                    [(ngModel)]="kvaReading"
                    [useGrouping]="false"
                    inputId="kvaReading"
                    placeholder="Enter reading"
                    class="w-full"
                ></p-inputnumber>

                @if (submitted && !isKvaReadingValid()) {
                    <small class="text-red-500">KVA reading is required.</small>
                }
            </div>

            <!-- Image -->
            <div>
                <label class="block text-sm font-semibold mb-2">Reading Image *</label>

                <!-- Hidden file input -->
                <input
                    #fileInput
                    type="file"
                    accept="image/*"
                    capture="environment"
                    class="hidden"
                    (change)="onFileSelected($event)"
                />

                <div class="flex gap-2">
                    <p-button
                        class="flex-1"
                        icon="pi pi-camera"
                        label="Camera / Gallery"
                        severity="secondary"
                        (click)="fileInput.click()"
                    ></p-button>

                    <p-button
                        icon="pi pi-times"
                        severity="secondary"
                        outlined
                        [disabled]="!imageFile"
                        (click)="clearImage()"
                    ></p-button>
                </div>

                @if (submitted && !imageFile) {
                    <small class="text-red-500">Image is required.</small>
                }

                <!-- Preview -->
                @if (imagePreviewUrl) {
                    <div class="mt-3">
                        <img
                            [src]="imagePreviewUrl"
                            alt="KVA reading preview"
                            class="w-full rounded-lg border border-surface-200"
                        />
                        <div class="text-xs text-color-secondary mt-1 truncate">
                            {{ imageFile?.name }}
                        </div>
                    </div>
                }
            </div>

            <!-- Actions -->
            <div class="flex flex-row">
                <p-button
                    label="Submit"
                    icon="pi pi-check"
                    class="me-2"
                    [loading]="saving"
                    (click)="submit()"
                ></p-button>
            </div>
        </div>
    </div>

</div>
