<app-floating-configurator />
<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <img ngSrc="/logo/logo.svg" alt="Echtirak Logo" height="50" width="50" class="mb-8 w-16 shrink-0 mx-auto" priority />
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Welcome to {{appName}} !</div>
                    <span class="text-muted-color font-medium">Sign in to continue</span>
                </div>

                <form [formGroup]="signInForm">
                    <label for="username1" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Username</label>
                    <input pInputText id="username1" type="text" placeholder="Username" class="w-full md:w-120 mb-4"  formControlName="username" [invalid]="isInvalid('username')" />

                    @if (isInvalid('username')) {
                        <p-message severity="error" size="small" variant="simple">Username is required.</p-message>
                    }

                    <label for="password1" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2 mt-2">Password</label>
                    <p-password id="password1" formControlName="password" [invalid]="isInvalid('password')" placeholder="Password" [toggleMask]="true" styleClass="mb-4" [fluid]="true" [feedback]="false" (keydown.enter)="signIn()"></p-password>

                    @if (isInvalid('password')) {
                        <p-message severity="error" size="small" variant="simple">Password is required.</p-message>
                    }

                    <div class="flex items-center justify-between mt-2 mb-8 gap-8">
                    </div>
                    <p-button label="Sign In" styleClass="w-full" [loading]="signingIn" (click)="signIn()"></p-button>
                </form>

            </div>
        </div>
    </div>
</div>
