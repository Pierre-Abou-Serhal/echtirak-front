<!-- LANDING FOOTER (clean + minimal, Sakai-friendly) -->
<footer class="mt-20">
    <!-- Top block -->
    <div class="px-6 lg:px-20 py-12 bg-surface-0 dark:bg-surface-900 border-t border-surface-200 dark:border-surface-700">
        <div class="grid grid-cols-12 gap-8 items-start">

            <!-- Brand -->
            <div class="col-span-12 lg:col-span-5">
                <a
                    (click)="router.navigate(['/'], { fragment: 'home' })"
                    class="flex items-center justify-center lg:justify-start cursor-pointer"
                >
                    <img ngSrc="/logo/logo.svg" alt="Echtirak Logo" height="50" width="50" class="w-14 me-3 shrink-0" priority />
                    <div>
                        <div class="font-semibold text-3xl text-surface-900 dark:text-surface-0 leading-tight">
                            {{environment.appName}}
                        </div>
                        <div class="text-muted-color text-lg mt-1">
                            Powering subscriptions for generator owners in Lebanon.
                        </div>
                    </div>
                </a>

                <!-- Quick CTA -->
                <div class="mt-6 flex flex-wrap gap-2 justify-center lg:justify-start">
                    <a pButton pRipple routerLink="/auth/sign-in" label="Get Started" icon="pi pi-play" class="p-button-rounded"></a>
                </div>

            </div>

            <!-- Links (only what you want) -->
            <div class="col-span-12 lg:col-span-7">
                <div class="grid grid-cols-12 gap-6 text-center lg:text-left">

                    <!-- About -->
                    <div class="col-span-12 md:col-span-6">
                        <div class="text-surface-900 dark:text-surface-0 font-semibold text-2xl mb-4">About</div>

                        <a
                            class="block text-xl mb-3 text-surface-700 dark:text-surface-100 hover:text-primary transition-colors cursor-pointer"
                            (click)="router.navigate(['/'], { fragment: 'home' })"
                        >
                            About Us
                        </a>

                    </div>

                    <!-- Legal -->
                    <div class="col-span-12 md:col-span-6">
                        <div class="text-surface-900 dark:text-surface-0 font-semibold text-2xl mb-4">Legal</div>

                        <a class="block text-xl mb-3 text-surface-700 dark:text-surface-100 hover:text-primary transition-colors cursor-pointer">
                            Brand Policy
                        </a>
                        <a class="block text-xl mb-3 text-surface-700 dark:text-surface-100 hover:text-primary transition-colors cursor-pointer">
                            Privacy Policy
                        </a>
                        <a class="block text-xl text-surface-700 dark:text-surface-100 hover:text-primary transition-colors cursor-pointer">
                            Terms of Service
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Bottom bar -->
    <div class="px-6 lg:px-20 py-6 bg-surface-50 dark:bg-surface-800 border-t border-surface-200 dark:border-surface-700">
        <div class="flex flex-col md:flex-row items-center justify-between gap-3 text-muted-color">
            <div class="text-center md:text-left">
                © {{ fullyear }} {{environment.appName}}. All rights reserved.
            </div>

            <!-- Optional social icons (remove if you don’t want) -->
            <div class="flex items-center gap-2">
                <button pButton pRipple type="button" icon="pi pi-facebook" class="p-button-rounded p-button-text"></button>
                <button pButton pRipple type="button" icon="pi pi-instagram" class="p-button-rounded p-button-text"></button>
                <button pButton pRipple type="button" icon="pi pi-linkedin" class="p-button-rounded p-button-text"></button>
            </div>
        </div>
    </div>
</footer>
